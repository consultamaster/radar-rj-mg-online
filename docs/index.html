<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Radar de Distribuições — RJ e Falência · TJMG</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=IBM+Plex+Sans:wght@400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #10151F;
    --bg-alt: #0C1017;
    --surface: #1B2433;
    --surface-alt: #141B27;
    --divider: #2E3A4E;
    --text: #E8E6DE;
    --text-body: #C9C4B4;
    --text-muted: #8B93A6;
    --text-faint: #5C6579;
    --brass: #C9A227;
    --blue: #7C93B0;
    --red: #B0524F;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: 'IBM Plex Sans', sans-serif;
  }
  a { color: inherit; }
  header.masthead {
    border-bottom: 1px solid var(--divider);
    background: var(--bg-alt);
  }
  .wrap {
    max-width: 900px;
    margin: 0 auto;
    padding: 0 24px;
  }
  .masthead-inner {
    padding: 32px 0;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .eyebrow {
    font-size: 11px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: var(--brass);
    margin: 0 0 8px;
  }
  h1 {
    font-family: 'Fraunces', serif;
    font-weight: 500;
    font-size: 34px;
    margin: 0;
    line-height: 1.1;
  }
  .subdate {
    color: var(--text-muted);
    font-size: 14px;
    margin: 6px 0 0;
    text-transform: capitalize;
  }
  .selos { display: flex; gap: 12px; }
  .selo {
    width: 78px; height: 78px;
    border: 1px dashed;
    border-radius: 999px;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .selo .valor {
    font-family: 'Fraunces', serif;
    font-size: 20px; font-weight: 600;
  }
  .selo .label {
    font-size: 9px; text-transform: uppercase;
    letter-spacing: 0.05em; text-align: center;
    color: var(--text-muted); padding: 0 4px; line-height: 1.2;
  }

  .filtros {
    display: flex; flex-wrap: wrap; align-items: center; gap: 12px;
    padding: 16px; margin-top: 24px;
    background: var(--surface); border: 1px solid var(--divider); border-radius: 10px;
  }
  .campo {
    display: flex; align-items: center; gap: 8px;
    padding: 8px 12px; border-radius: 6px;
    border: 1px solid var(--divider); background: var(--surface-alt);
  }
  .campo input, .campo select {
    background: transparent; border: none; outline: none;
    color: var(--text); font-size: 14px; font-family: inherit;
  }
  .campo input[type="date"] { color-scheme: dark; }
  .campo.busca { flex: 1; min-width: 160px; }
  .campo.busca input { width: 100%; }
  select option { background: var(--surface-alt); }

  .pill {
    font-size: 12px; padding: 6px 14px; border-radius: 999px;
    border: 1px solid; background: transparent; cursor: pointer;
    font-family: inherit;
  }

  main { padding: 24px 0 12px; }
  .contagem { font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted); margin: 0 0 12px; }

  .card {
    position: relative;
    display: flex; gap: 16px;
    border: 1px solid var(--divider); border-radius: 10px;
    background: var(--surface);
    overflow: hidden;
    margin-bottom: 12px;
  }
  .card .barra { width: 6px; flex-shrink: 0; }
  .card .conteudo { padding: 16px 16px 16px 0; flex: 1; }
  .card .linha1 { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 6px; }
  .numero { font-family: 'IBM Plex Mono', monospace; font-size: 15px; }
  .tag { font-size: 10px; text-transform: uppercase; letter-spacing: 0.05em; padding: 2px 10px; border-radius: 999px; border: 1px solid; }
  .assunto { font-size: 14px; color: var(--text-body); margin: 0; }
  .meta { display: flex; gap: 16px; flex-wrap: wrap; font-size: 12px; color: var(--text-muted); margin-top: 8px; }

  .carimbo {
    position: absolute; top: -8px; right: -8px;
    transform: rotate(12deg);
    border: 2px dashed var(--brass); color: var(--brass);
    background: rgba(201,162,39,0.08);
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px; font-weight: 600; letter-spacing: 0.15em;
    padding: 2px 8px; border-radius: 4px;
  }

  .vazio, .carregando, .erro {
    text-align: center; padding: 60px 16px;
    border: 1px dashed var(--divider); border-radius: 10px;
    color: var(--text-muted);
  }
  .erro { color: var(--red); border-color: var(--red); }

  footer { padding: 16px 0 48px; font-size: 12px; color: var(--text-faint); }

  @media (max-width: 560px) {
    h1 { font-size: 26px; }
    .selos { width: 100%; justify-content: flex-start; }
  }
</style>
</head>
<body>

<header class="masthead">
  <div class="wrap masthead-inner">
    <div>
      <p class="eyebrow">Administração Judicial · TJMG</p>
      <h1>Radar de Distribuições</h1>
      <p class="subdate" id="dataFormatada">carregando...</p>
    </div>
    <div class="selos" id="selos"></div>
  </div>
</header>

<div class="wrap">
  <div class="filtros">
    <div class="campo">
      <span>📅 De</span>
      <input type="date" id="dataDe" />
    </div>
    <div class="campo">
      <span>Até</span>
      <input type="date" id="dataAte" />
    </div>
    <div class="campo">
      <span>📍</span>
      <select id="seletorComarca"><option value="Todas">Todas</option></select>
    </div>
    <div class="campo busca">
      <span>🔎</span>
      <input type="text" id="busca" placeholder="Buscar número ou assunto" />
    </div>
    <div id="pillsClasse" style="display:flex; gap:8px; flex-wrap:wrap;"></div>
  </div>

  <main>
    <p class="contagem" id="contagemTexto"></p>
    <div id="lista"></div>
  </main>

  <footer>
    Fonte: API Pública do DataJud (CNJ) · TJMG. Atualizado automaticamente todos os dias às 08h.
  </footer>
</div>

<script>
const CLASSES = {
  129: { nome: "Recuperação Judicial", cor: "#C9A227" },
  128: { nome: "Recuperação Extrajudicial", cor: "#7C93B0" },
  108: { nome: "Falência", cor: "#B0524F" },
};

let processosDoIntervalo = [];
let classesAtivas = new Set(Object.keys(CLASSES).map(Number));

function hojeISO(diasAtras = 0) {
  const d = new Date();
  d.setDate(d.getDate() - diasAtras);
  return d.toISOString().split('T')[0];
}

function diasEntre(de, ate) {
  const dias = [];
  let atual = de;
  while (atual <= ate) {
    dias.push(atual);
    const d = new Date(`${atual}T00:00:00`);
    d.setDate(d.getDate() + 1);
    atual = d.toISOString().split('T')[0];
  }
  return dias;
}

function formatarDataCurta(valor) {
  // Aceita tanto "AAAA-MM-DD" (datas do seletor/índice) quanto
  // "AAAA-MM-DDTHH:mm:ss" (data de ajuizamento de cada processo).
  const dataSimples = valor.slice(0, 10);
  const d = new Date(`${dataSimples}T12:00:00`);
  return d.toLocaleDateString('pt-BR');
}

async function carregarIntervalo(de, ate) {
  document.getElementById('lista').innerHTML = '<div class="carregando">Carregando...</div>';

  if (de > ate) { ate = de; document.getElementById('dataAte').value = ate; }

  const dias = diasEntre(de, ate);
  const resultados = await Promise.all(
    dias.map(async (dia) => {
      try {
        const resp = await fetch(`data/${dia}.json`);
        return resp.ok ? await resp.json() : [];
      } catch (e) {
        return [];
      }
    })
  );

  processosDoIntervalo = resultados.flat();
  atualizarCabecalho(de, ate);
  montarComarcas();
  render();
}

function atualizarCabecalho(de, ate) {
  const texto = de === ate
    ? new Date(`${de}T12:00:00`).toLocaleDateString('pt-BR', { weekday: 'long', day: '2-digit', month: 'long', year: 'numeric' })
    : `de ${formatarDataCurta(de)} até ${formatarDataCurta(ate)}`;
  document.getElementById('dataFormatada').textContent = texto;

  const selos = document.getElementById('selos');
  selos.innerHTML = Object.entries(CLASSES).map(([id, cl]) => {
    const total = processosDoIntervalo.filter((p) => p.classeId === Number(id)).length;
    return `<div class="selo" style="border-color:${cl.cor}">
      <span class="valor" style="color:${cl.cor}">${total}</span>
      <span class="label">${cl.nome}</span>
    </div>`;
  }).join('');
}

function montarComarcas() {
  const comarcas = Array.from(new Set(processosDoIntervalo.map((p) => p.orgaoJulgador).filter(Boolean)));
  const seletor = document.getElementById('seletorComarca');
  const atual = seletor.value || 'Todas';
  seletor.innerHTML = '<option value="Todas">Todas</option>' +
    comarcas.map((c) => `<option value="${c}">${c}</option>`).join('');
  seletor.value = comarcas.includes(atual) ? atual : 'Todas';
}

function montarPillsClasse() {
  const container = document.getElementById('pillsClasse');
  container.innerHTML = Object.entries(CLASSES).map(([id, cl]) => {
    const ativo = classesAtivas.has(Number(id));
    return `<button class="pill" data-id="${id}" style="border-color:${cl.cor}; color:${ativo ? '#10151F' : cl.cor}; background:${ativo ? cl.cor : 'transparent'}">${cl.nome}</button>`;
  }).join('');
  container.querySelectorAll('.pill').forEach((btn) => {
    btn.addEventListener('click', () => {
      const id = Number(btn.dataset.id);
      classesAtivas.has(id) ? classesAtivas.delete(id) : classesAtivas.add(id);
      montarPillsClasse();
      render();
    });
  });
}

function render() {
  const comarca = document.getElementById('seletorComarca').value;
  const busca = document.getElementById('busca').value.toLowerCase();

  const filtrados = processosDoIntervalo.filter((p) => {
    if (!classesAtivas.has(p.classeId)) return false;
    if (comarca !== 'Todas' && p.orgaoJulgador !== comarca) return false;
    if (busca) {
      const alvo = `${p.numeroProcesso} ${(p.assuntos || []).join(' ')}`.toLowerCase();
      if (!alvo.includes(busca)) return false;
    }
    return true;
  });

  document.getElementById('contagemTexto').textContent = `${filtrados.length} processo(s) encontrado(s)`;

  const lista = document.getElementById('lista');
  if (filtrados.length === 0) {
    lista.innerHTML = '<div class="vazio">Nenhum processo encontrado com esses filtros.</div>';
    return;
  }

  lista.innerHTML = filtrados.map((p) => {
    const cl = CLASSES[p.classeId] || { nome: p.classe || '—', cor: '#8B93A6' };
    return `
    <div class="card">
      <div class="barra" style="background:${cl.cor}"></div>
      <div class="conteudo">
        ${p.novo ? '<div class="carimbo">NOVO</div>' : ''}
        <div class="linha1">
          <span class="numero">${p.numeroProcesso}</span>
          <span class="tag" style="border-color:${cl.cor}; color:${cl.cor}">${cl.nome}</span>
        </div>
        <p class="assunto">${(p.assuntos || []).join(', ') || '—'}</p>
        <div class="meta">
          <span>📍 ${p.orgaoJulgador || '—'}</span>
          <span>Distribuído em ${formatarDataCurta(p.dataAjuizamento)}</span>
        </div>
      </div>
    </div>`;
  }).join('');
}

function dispararIntervalo() {
  const de = document.getElementById('dataDe').value;
  const ate = document.getElementById('dataAte').value;
  if (de && ate) carregarIntervalo(de, ate);
}

document.getElementById('dataDe').addEventListener('change', dispararIntervalo);
document.getElementById('dataAte').addEventListener('change', dispararIntervalo);
document.getElementById('seletorComarca').addEventListener('change', render);
document.getElementById('busca').addEventListener('input', render);

montarPillsClasse();

// Padrão: D-1 até D-1 (dia anterior, que é o que a consulta automática busca)
const padraoDe = hojeISO(1);
document.getElementById('dataDe').value = padraoDe;
document.getElementById('dataAte').value = padraoDe;
carregarIntervalo(padraoDe, padraoDe).catch(() => {
  document.getElementById('dataFormatada').textContent = 'Sem dados ainda';
  document.getElementById('lista').innerHTML = '<div class="vazio">Ainda não há relatórios publicados para esse período.</div>';
});
</script>

</body>
</html>
